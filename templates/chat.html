<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат - Мессенджер</title>
    <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            overflow: hidden;
            background: #f0f2f5;
        }

        .contacts-sidebar {
            width: 300px;
            background: white;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }

        .contacts-header {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
        }

        .contacts-header h2 {
            color: #333;
            font-size: 1.5em;
        }

        .user-info {
            display: flex;
            align-items: center;
            margin-top: 10px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 10px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 10px;
        }

        .user-details {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
        }

        .user-username {
            font-size: 12px;
            color: #666;
        }

        .contacts-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 5px;
        }

        .contact-item:hover {
            background: #f5f5f5;
        }

        .contact-item.active {
            background: #e8eaf6;
        }

        .contact-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #4CAF50;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 10px;
        }

        .contact-info {
            flex: 1;
        }

        .contact-name {
            font-weight: 500;
        }

        .contact-username {
            font-size: 12px;
            color: #666;
        }

        .call-button {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: transform 0.2s;
        }

        .call-button:hover {
            transform: scale(1.1);
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-header-name {
            font-size: 1.2em;
            font-weight: 600;
        }

        .chat-header-username {
            color: #666;
            font-size: 14px;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .message {
            max-width: 60%;
            margin-bottom: 10px;
            padding: 10px 15px;
            border-radius: 18px;
            position: relative;
        }

        .message.sent {
            align-self: flex-end;
            background: #667eea;
            color: white;
        }

        .message.received {
            align-self: flex-start;
            background: #f0f2f5;
            color: #333;
        }

        .message-time {
            font-size: 11px;
            margin-top: 5px;
            opacity: 0.7;
        }

        .message-input-area {
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .message-input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        .message-input:focus {
            border-color: #667eea;
        }

        .send-button {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
        }

        .modal-content {
            position: relative;
            width: 90%;
            max-width: 800px;
            margin: 50px auto;
            background: #1a1a1a;
            border-radius: 20px;
            padding: 20px;
        }

        .video-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            min-height: 400px;
        }

        .video-wrapper {
            position: relative;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
        }

        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
        }

        .call-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .call-button-end {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #f44336;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 24px;
        }

        .call-button-mute {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #666;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 24px;
        }

        .close-modal {
            position: absolute;
            top: -40px;
            right: 0;
            color: white;
            font-size: 30px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="contacts-sidebar">
        <div class="contacts-header">
            <h2>📱 Мессенджер</h2>
            <div class="user-info" id="currentUserInfo">
                <div class="user-avatar" id="currentUserAvatar"></div>
                <div class="user-details">
                    <div class="user-name" id="currentUserName">Загрузка...</div>
                    <div class="user-username" id="currentUserUsername"></div>
                </div>
            </div>
        </div>
        <div class="contacts-list" id="contactsList">
            <!-- Контакты будут загружены через JS -->
        </div>
    </div>

    <div class="chat-area">
        <div class="chat-header" id="chatHeader" style="display: none;">
            <div class="chat-header-info">
                <div class="chat-header-name" id="chatContactName"></div>
                <div class="chat-header-username" id="chatContactUsername"></div>
            </div>
        </div>

        <div class="messages-container" id="messagesContainer">
            <!-- Сообщения будут загружены через JS -->
        </div>

        <div class="message-input-area" id="messageInputArea" style="display: none;">
            <input type="text" class="message-input" id="messageInput" placeholder="Введите сообщение...">
            <button class="send-button" id="sendMessageBtn">➤</button>
        </div>
    </div>

    <!-- Модальное окно видеозвонка -->
    <div class="modal" id="callModal">
        <div class="modal-content">
            <span class="close-modal" onclick="endCall()">&times;</span>
            <div class="video-container">
                <div class="video-wrapper">
                    <video id="localVideo" autoplay muted playsinline></video>
                    <div class="video-label">Вы</div>
                </div>
                <div class="video-wrapper">
                    <video id="remoteVideo" autoplay playsinline></video>
                    <div class="video-label" id="remoteVideoLabel">Собеседник</div>
                </div>
            </div>
            <div class="call-controls">
                <button class="call-button-mute" id="muteAudioBtn">🎤</button>
                <button class="call-button-end" onclick="endCall()">📞</button>
                <button class="call-button-mute" id="muteVideoBtn">📹</button>
            </div>
        </div>
    </div>

    <script>
        let currentUserId = null;
        let currentUser = null;
        let selectedUserId = null;
        let ws = null;
        let peers = {};
        let localStream = null;
        const callModal = document.getElementById('callModal');
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');

        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/login';
        }

        function parseJwt(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch(e) {
                return null;
            }
        }

        const jwtPayload = parseJwt(token);
        if (jwtPayload && jwtPayload.sub) {
            currentUserId = parseInt(jwtPayload.sub);
        }

        async function loadContacts() {
            try {
                const response = await fetch('/api/contacts', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    const contacts = await response.json();
                    displayContacts(contacts);
                } else if (response.status === 401) {
                    localStorage.removeItem('token');
                    window.location.href = '/login';
                }
            } catch (err) {
                console.error('Error loading contacts:', err);
            }
        }

        function displayContacts(contacts) {
            const contactsList = document.getElementById('contactsList');
            contactsList.innerHTML = '';

            contacts.forEach(contact => {
                const contactEl = document.createElement('div');
                contactEl.className = `contact-item ${selectedUserId === contact.id ? 'active' : ''}`;
                contactEl.onclick = () => selectContact(contact);

                const avatar = contact.full_name.charAt(0).toUpperCase();

                contactEl.innerHTML = `
                    <div class="contact-avatar">${avatar}</div>
                    <div class="contact-info">
                        <div class="contact-name">${contact.full_name}</div>
                        <div class="contact-username">${contact.username}</div>
                    </div>
                    <button class="call-button" onclick="event.stopPropagation(); startCall(${contact.id}, '${contact.full_name}')">📹</button>
                `;

                contactsList.appendChild(contactEl);
            });
        }

        function selectContact(contact) {
            selectedUserId = contact.id;

            document.getElementById('chatHeader').style.display = 'flex';
            document.getElementById('messageInputArea').style.display = 'flex';
            document.getElementById('chatContactName').textContent = contact.full_name;
            document.getElementById('chatContactUsername').textContent = contact.username;

            document.querySelectorAll('.contact-item').forEach(item => {
                item.classList.remove('active');
            });
            event.currentTarget.classList.add('active');

            loadMessages(contact.id);
        }

        async function loadMessages(userId) {
            try {
                const response = await fetch(`/api/messages/${userId}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    const messages = await response.json();
                    displayMessages(messages);
                }
            } catch (err) {
                console.error('Error loading messages:', err);
            }
        }

        function displayMessages(messages) {
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';

            messages.forEach(msg => {
                const messageEl = document.createElement('div');
                messageEl.className = `message ${msg.sender_id === currentUserId ? 'sent' : 'received'}`;

                const time = new Date(msg.timestamp).toLocaleTimeString('ru-RU', {
                    hour: '2-digit',
                    minute: '2-digit'
                });

                messageEl.innerHTML = `
                    ${msg.content}
                    <div class="message-time">${time}</div>
                `;

                container.appendChild(messageEl);
            });

            container.scrollTop = container.scrollHeight;
        }

        function connectWebSocket() {
            if (!currentUserId) return;

            const wsUrl = `ws://${window.location.host}/ws/${currentUserId}`;
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log('WebSocket connected');
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);

                if (data.type === 'message') {
                    if (data.sender_id === selectedUserId) {
                        const messageEl = document.createElement('div');
                        messageEl.className = 'message received';

                        const time = new Date(data.timestamp).toLocaleTimeString('ru-RU', {
                            hour: '2-digit',
                            minute: '2-digit'
                        });

                        messageEl.innerHTML = `
                            ${data.content}
                            <div class="message-time">${time}</div>
                        `;

                        document.getElementById('messagesContainer').appendChild(messageEl);
                        document.getElementById('messagesContainer').scrollTop =
                            document.getElementById('messagesContainer').scrollHeight;
                    }
                } else if (data.type === 'offer') {
                    handleOffer(data);
                } else if (data.type === 'answer') {
                    handleAnswer(data);
                } else if (data.type === 'ice-candidate') {
                    handleIceCandidate(data);
                }
            };

            ws.onclose = () => {
                console.log('WebSocket disconnected, reconnecting...');
                setTimeout(connectWebSocket, 3000);
            };
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();

            if (!content || !selectedUserId || !ws) return;

            ws.send(JSON.stringify({
                type: 'message',
                receiver_id: selectedUserId,
                content: content
            }));

            const messageEl = document.createElement('div');
            messageEl.className = 'message sent';

            const time = new Date().toLocaleTimeString('ru-RU', {
                hour: '2-digit',
                minute: '2-digit'
            });

            messageEl.innerHTML = `
                ${content}
                <div class="message-time">${time}</div>
            `;

            document.getElementById('messagesContainer').appendChild(messageEl);
            document.getElementById('messagesContainer').scrollTop =
                document.getElementById('messagesContainer').scrollHeight;

            input.value = '';
        }

        async function startCall(targetUserId, targetUserName) {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                localVideo.srcObject = localStream;

                const peer = new SimplePeer({
                    initiator: true,
                    stream: localStream,
                    trickle: false
                });

                peers[targetUserId] = peer;

                peer.on('signal', (data) => {
                    ws.send(JSON.stringify({
                        type: data.type,
                        target_user_id: targetUserId,
                        sdp: data.sdp,
                        candidate: data.candidate
                    }));
                });

                peer.on('stream', (stream) => {
                    remoteVideo.srcObject = stream;
                });

                document.getElementById('remoteVideoLabel').textContent = targetUserName;
                callModal.style.display = 'block';

            } catch (err) {
                console.error('Error starting call:', err);
                alert('Не удалось получить доступ к камере/микрофону');
            }
        }

        function handleOffer(data) {
            console.log('Incoming call from user', data.sender_id);
        }

        function handleAnswer(data) {
            if (peers[data.sender_id]) {
                peers[data.sender_id].signal(data);
            }
        }

        function handleIceCandidate(data) {
            if (peers[data.sender_id]) {
                peers[data.sender_id].signal(data);
            }
        }

        function endCall() {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }

            Object.values(peers).forEach(peer => peer.destroy());
            peers = {};

            callModal.style.display = 'none';
        }

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('/api/contacts', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    const contacts = await response.json();
                }
            } catch (err) {
                console.error('Error:', err);
            }

            await loadContacts();
            connectWebSocket();

            document.getElementById('sendMessageBtn').onclick = sendMessage;
            document.getElementById('messageInput').onkeypress = (e) => {
                if (e.key === 'Enter') sendMessage();
            };

            document.getElementById('muteAudioBtn').onclick = () => {
                if (localStream) {
                    const audioTrack = localStream.getAudioTracks()[0];
                    if (audioTrack) {
                        audioTrack.enabled = !audioTrack.enabled;
                        document.getElementById('muteAudioBtn').style.opacity =
                            audioTrack.enabled ? '1' : '0.5';
                    }
                }
            };

            document.getElementById('muteVideoBtn').onclick = () => {
                if (localStream) {
                    const videoTrack = localStream.getVideoTracks()[0];
                    if (videoTrack) {
                        videoTrack.enabled = !videoTrack.enabled;
                        document.getElementById('muteVideoBtn').style.opacity =
                            videoTrack.enabled ? '1' : '0.5';
                    }
                }
            };
        });
    </script>
</body>
</html>
