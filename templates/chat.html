<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат - Мессенджер</title>
    <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }
        
        body {
            height: 100vh;
            display: flex;
            overflow: hidden;
            background: #f0f2f5;
        }
        
        .contacts-sidebar {
            width: 300px;
            background: white;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }
        
        .contacts-header {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .contacts-header h2 {
            color: #333;
            font-size: 1.5em;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            margin-top: 10px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 10px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 10px;
        }
        
        .user-details {
            flex: 1;
        }
        
        .user-name {
            font-weight: 600;
        }
        
        .user-username {
            font-size: 12px;
            color: #666;
        }
        
        .contacts-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        
        .contact-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 5px;
        }
        
        .contact-item:hover {
            background: #f5f5f5;
        }
        
        .contact-item.active {
            background: #e8eaf6;
        }
        
        .contact-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #4CAF50;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 10px;
        }
        
        .contact-info {
            flex: 1;
        }
        
        .contact-name {
            font-weight: 500;
        }
        
        .contact-username {
            font-size: 12px;
            color: #666;
        }
        
        .call-button {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: transform 0.2s;
        }
        
        .call-button:hover {
            transform: scale(1.1);
        }
        
        .call-button.ringing {
            animation: ring 1s infinite;
            background: #ff9800;
        }
        
        @keyframes ring {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }
        
        .chat-header {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
        }
        
        .chat-header-info {
            flex: 1;
        }
        
        .chat-header-name {
            font-size: 1.2em;
            font-weight: 600;
        }
        
        .chat-header-username {
            color: #666;
            font-size: 14px;
        }
        
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        
        .message {
            max-width: 60%;
            margin-bottom: 10px;
            padding: 10px 15px;
            border-radius: 18px;
            position: relative;
            word-wrap: break-word;
        }
        
        .message.sent {
            align-self: flex-end;
            background: #667eea;
            color: white;
        }
        
        .message.received {
            align-self: flex-start;
            background: #f0f2f5;
            color: #333;
        }
        
        .message-time {
            font-size: 11px;
            margin-top: 5px;
            opacity: 0.7;
        }
        
        .message-input-area {
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }
        
        .message-input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .message-input:focus {
            border-color: #667eea;
        }
        
        .send-button {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .send-button:hover {
            background: #5a6fd8;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
        }
        
        .modal-content {
            position: relative;
            width: 90%;
            max-width: 800px;
            margin: 50px auto;
            background: #1a1a1a;
            border-radius: 20px;
            padding: 20px;
        }
        
        .video-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            min-height: 400px;
        }
        
        .video-wrapper {
            position: relative;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            min-height: 300px;
        }
        
        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .video-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
        }
        
        .call-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        
        .call-button-end {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #f44336;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 24px;
        }
        
        .call-button-mute {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #666;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 24px;
        }
        
        .close-modal {
            position: absolute;
            top: -40px;
            right: 0;
            color: white;
            font-size: 30px;
            cursor: pointer;
        }

        .ws-status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            font-size: 14px;
            z-index: 1001;
            display: none;
        }

        .ws-status.connected {
            background: #4CAF50;
            display: block;
        }

        .ws-status.disconnected {
            background: #f44336;
            display: block;
        }

        .ws-status.reconnecting {
            background: #ff9800;
            display: block;
        }

        /* Уведомление о входящем звонке */
        .incoming-call {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            padding: 20px;
            z-index: 2000;
            animation: slideIn 0.3s;
            min-width: 300px;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .incoming-call-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .incoming-call-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            margin-right: 15px;
        }

        .incoming-call-info h3 {
            margin: 0;
            color: #333;
        }

        .incoming-call-info p {
            margin: 5px 0 0;
            color: #666;
        }

        .incoming-call-buttons {
            display: flex;
            gap: 10px;
        }

        .accept-call {
            flex: 1;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        .reject-call {
            flex: 1;
            padding: 10px;
            background: #f44336;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="contacts-sidebar">
        <div class="contacts-header">
            <h2>📱 Мессенджер</h2>
            <div class="user-info" id="currentUserInfo">
                <div class="user-avatar" id="currentUserAvatar"></div>
                <div class="user-details">
                    <div class="user-name" id="currentUserName">Загрузка...</div>
                    <div class="user-username" id="currentUserUsername"></div>
                </div>
            </div>
        </div>
        <div class="contacts-list" id="contactsList">
            <!-- Контакты будут загружены через JS -->
        </div>
    </div>
    
    <div class="chat-area">
        <div class="chat-header" id="chatHeader" style="display: none;">
            <div class="chat-header-info">
                <div class="chat-header-name" id="chatContactName"></div>
                <div class="chat-header-username" id="chatContactUsername"></div>
            </div>
        </div>
        
        <div class="messages-container" id="messagesContainer">
            <!-- Сообщения будут загружены через JS -->
        </div>
        
        <div class="message-input-area" id="messageInputArea" style="display: none;">
            <input type="text" class="message-input" id="messageInput" placeholder="Введите сообщение...">
            <button class="send-button" id="sendMessageBtn">➤</button>
        </div>
    </div>
    
    <!-- Модальное окно видеозвонка -->
    <div class="modal" id="callModal">
        <div class="modal-content">
            <span class="close-modal" onclick="endCall()">&times;</span>
            <div class="video-container">
                <div class="video-wrapper">
                    <video id="localVideo" autoplay muted playsinline></video>
                    <div class="video-label">Вы</div>
                </div>
                <div class="video-wrapper">
                    <video id="remoteVideo" autoplay playsinline></video>
                    <div class="video-label" id="remoteVideoLabel">Собеседник</div>
                </div>
            </div>
            <div class="call-controls">
                <button class="call-button-mute" id="muteAudioBtn">🎤</button>
                <button class="call-button-end" onclick="endCall()">📞</button>
                <button class="call-button-mute" id="muteVideoBtn">📹</button>
            </div>
        </div>
    </div>

    <div class="ws-status" id="wsStatus">Статус подключения</div>

    <!-- Контейнер для уведомлений о входящих звонках -->
    <div id="incomingCallContainer"></div>

    <script>
        // Глобальные переменные
        let currentUserId = null;
        let currentUser = null;
        let selectedUserId = null;
        let ws = null;
        let peers = {};
        let localStream = null;
        let reconnectAttempts = 0;
        const maxReconnectAttempts = 5;
        let activeCall = null;
        let incomingCallTimeout = null;
        
        const callModal = document.getElementById('callModal');
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const wsStatus = document.getElementById('wsStatus');
        const incomingCallContainer = document.getElementById('incomingCallContainer');
        
        // Получение токена из localStorage
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/login';
        }
        
        // Декодирование JWT для получения ID пользователя
        function parseJwt(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch(e) {
                console.error('Error parsing JWT:', e);
                return null;
            }
        }
        
        const jwtPayload = parseJwt(token);
        if (jwtPayload && jwtPayload.sub) {
            currentUserId = parseInt(jwtPayload.sub);
            console.log('Current user ID:', currentUserId);
        }
        
        // Функция обновления статуса WebSocket
        function updateWSStatus(status, message) {
            wsStatus.className = 'ws-status ' + status;
            wsStatus.textContent = message || 'Статус подключения';
        }
        
        // Загрузка контактов
        async function loadContacts() {
            try {
                console.log('Loading contacts...');
                const response = await fetch('/api/contacts', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (response.ok) {
                    const contacts = await response.json();
                    console.log('Contacts loaded:', contacts.length);
                    displayContacts(contacts);
                    
                    // Обновляем информацию о текущем пользователе
                    const currentUserContact = contacts.find(c => c.id === currentUserId);
                    if (currentUserContact) {
                        document.getElementById('currentUserName').textContent = currentUserContact.full_name;
                        document.getElementById('currentUserUsername').textContent = currentUserContact.username;
                        document.getElementById('currentUserAvatar').textContent = 
                            currentUserContact.full_name.charAt(0).toUpperCase();
                    }
                } else if (response.status === 401) {
                    console.log('Unauthorized, redirecting to login');
                    localStorage.removeItem('token');
                    window.location.href = '/login';
                }
            } catch (err) {
                console.error('Error loading contacts:', err);
                updateWSStatus('disconnected', 'Ошибка загрузки контактов');
            }
        }
        
        // Отображение контактов
        function displayContacts(contacts) {
            const contactsList = document.getElementById('contactsList');
            contactsList.innerHTML = '';
            
            contacts.forEach(contact => {
                const contactEl = document.createElement('div');
                contactEl.className = `contact-item ${selectedUserId === contact.id ? 'active' : ''}`;
                contactEl.onclick = () => selectContact(contact);
                
                const avatar = contact.full_name.charAt(0).toUpperCase();
                
                contactEl.innerHTML = `
                    <div class="contact-avatar">${avatar}</div>
                    <div class="contact-info">
                        <div class="contact-name">${contact.full_name}</div>
                        <div class="contact-username">${contact.username}</div>
                    </div>
                    <button class="call-button" onclick="event.stopPropagation(); startCall(${contact.id}, '${contact.full_name}')">📹</button>
                `;
                
                contactsList.appendChild(contactEl);
            });
        }
        
        // Выбор контакта для чата
        function selectContact(contact) {
            console.log('Selected contact:', contact);
            selectedUserId = contact.id;
            
            document.getElementById('chatHeader').style.display = 'flex';
            document.getElementById('messageInputArea').style.display = 'flex';
            document.getElementById('chatContactName').textContent = contact.full_name;
            document.getElementById('chatContactUsername').textContent = contact.username;
            
            // Обновляем активный класс в списке
            document.querySelectorAll('.contact-item').forEach(item => {
                item.classList.remove('active');
            });
            event.currentTarget.classList.add('active');
            
            loadMessages(contact.id);
        }
        
        // Загрузка сообщений
        async function loadMessages(userId) {
            try {
                console.log('Loading messages for user:', userId);
                const response = await fetch(`/api/messages/${userId}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (response.ok) {
                    const messages = await response.json();
                    console.log('Messages loaded:', messages.length);
                    displayMessages(messages);
                }
            } catch (err) {
                console.error('Error loading messages:', err);
            }
        }
        
        // Отображение сообщений
        function displayMessages(messages) {
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';
            
            messages.forEach(msg => {
                addMessageToChat(msg.content, msg.sender_id === currentUserId ? 'sent' : 'received', msg.timestamp);
            });
        }
        
        // Добавление сообщения в чат
        function addMessageToChat(content, type, timestamp) {
            const container = document.getElementById('messagesContainer');
            const messageEl = document.createElement('div');
            messageEl.className = `message ${type}`;
            
            let timeStr = '';
            if (timestamp) {
                const date = new Date(timestamp);
                timeStr = date.toLocaleTimeString('ru-RU', {
                    hour: '2-digit',
                    minute: '2-digit'
                });
            } else {
                timeStr = new Date().toLocaleTimeString('ru-RU', {
                    hour: '2-digit',
                    minute: '2-digit'
                });
            }
            
            messageEl.innerHTML = `
                ${content}
                <div class="message-time">${timeStr}</div>
            `;
            
            container.appendChild(messageEl);
            container.scrollTop = container.scrollHeight;
        }
        
        // WebSocket соединение
        function connectWebSocket() {
            if (!currentUserId) {
                console.log('No user ID, waiting...');
                setTimeout(connectWebSocket, 1000);
                return;
            }
            
            // Определяем протокол (wss для HTTPS, ws для HTTP)
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws/${currentUserId}`;
            
            console.log('Connecting to WebSocket:', wsUrl);
            updateWSStatus('reconnecting', 'Подключение...');
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                console.log('✅ WebSocket connected successfully');
                updateWSStatus('connected', '🟢 WebSocket подключен');
                reconnectAttempts = 0;
            };
            
            ws.onerror = (error) => {
                console.error('❌ WebSocket error:', error);
                updateWSStatus('disconnected', '🔴 Ошибка подключения');
            };
            
            ws.onmessage = (event) => {
                console.log('📩 WebSocket message received:', event.data);
                try {
                    const data = JSON.parse(event.data);
                    
                    if (data.type === 'message') {
                        // Новое сообщение
                        if (data.sender_id === selectedUserId) {
                            addMessageToChat(data.content, 'received', data.timestamp);
                        }
                    } else if (data.type === 'message_delivered') {
                        console.log('Message delivered to user', data.receiver_id);
                    } else if (data.type === 'offer' || data.type === 'answer') {
                        // Входящий звонок или ответ
                        handleCallSignal(data);
                    } else if (data.type === 'ice-candidate') {
                        // ICE кандидат
                        handleIceCandidate(data);
                    } else if (data.type === 'call-rejected') {
                        // Звонок отклонен
                        handleCallRejected(data);
                    }
                } catch (e) {
                    console.error('Error parsing message:', e);
                }
            };
            
            ws.onclose = (event) => {
                console.log('❌ WebSocket disconnected, reconnecting...', event.code, event.reason);
                
                if (reconnectAttempts < maxReconnectAttempts) {
                    reconnectAttempts++;
                    updateWSStatus('reconnecting', `⏳ Переподключение (${reconnectAttempts}/${maxReconnectAttempts})...`);
                    
                    setTimeout(() => {
                        connectWebSocket();
                    }, 3000);
                } else {
                    updateWSStatus('disconnected', '🔴 Нет соединения');
                }
            };
        }
        
        // Отправка сообщения
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            
            if (!content) {
                return;
            }
            
            if (!selectedUserId) {
                alert('Выберите контакт для отправки сообщения');
                return;
            }
            
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                alert('Нет соединения с сервером. Переподключение...');
                connectWebSocket();
                return;
            }
            
            const messageData = {
                type: 'message',
                receiver_id: selectedUserId,
                content: content
            };
            
            console.log('📤 Sending message:', messageData);
            
            try {
                ws.send(JSON.stringify(messageData));
                
                // Добавляем сообщение в чат (своё)
                addMessageToChat(content, 'sent');
                
                input.value = '';
            } catch (error) {
                console.error('Error sending message:', error);
                alert('Ошибка при отправке сообщения');
            }
        }
        
        // ========== ФУНКЦИИ ДЛЯ ЗВОНКОВ ==========
        
        // Начало звонка
        async function startCall(targetUserId, targetUserName) {
            try {
                console.log('Starting call to user:', targetUserId);
                
                // Проверяем, не занят ли уже пользователь
                if (activeCall) {
                    alert('У вас уже есть активный звонок');
                    return;
                }
                
                // Получаем доступ к камере и микрофону
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: true, 
                    audio: true 
                });
                localVideo.srcObject = localStream;
                
                // Создаем peer-соединение
                const peer = new SimplePeer({
                    initiator: true,
                    stream: localStream,
                    trickle: false,
                    config: {
                        iceServers: [
                            { urls: 'stun:stun.l.google.com:19302' },
                            { urls: 'stun:global.stun.twilio.com:3478' }
                        ]
                    }
                });
                
                peers[targetUserId] = peer;
                activeCall = {
                    userId: targetUserId,
                    userName: targetUserName,
                    peer: peer
                };
                
                // Обработка сигнальных данных
                peer.on('signal', (data) => {
                    console.log('Signal data:', data.type);
                    
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({
                            type: data.type,
                            sender_id: currentUserId,
                            target_user_id: targetUserId,
                            sdp: data.sdp,
                            candidate: data.candidate
                        }));
                    }
                });
                
                // Получение потока от собеседника
                peer.on('stream', (stream) => {
                    console.log('✅ Received remote stream');
                    remoteVideo.srcObject = stream;
                });
                
                // Обработка ошибок
                peer.on('error', (err) => {
                    console.error('Peer error:', err);
                    alert('Ошибка соединения');
                    endCall();
                });
                
                // Закрытие соединения
                peer.on('close', () => {
                    console.log('Peer connection closed');
                    endCall();
                });
                
                // Показываем модальное окно
                document.getElementById('remoteVideoLabel').textContent = targetUserName;
                callModal.style.display = 'block';
                
                // Показываем индикатор звонка на кнопке
                const callButtons = document.querySelectorAll('.call-button');
                callButtons.forEach(btn => {
                    if (btn.onclick && btn.onclick.toString().includes(targetUserId)) {
                        btn.classList.add('ringing');
                    }
                });
                
            } catch (err) {
                console.error('Error starting call:', err);
                alert('Не удалось получить доступ к камере/микрофону');
            }
        }
        
        // Обработка входящего сигнала звонка
        function handleCallSignal(data) {
            console.log('📞🔔 INCOMING CALL SIGNAL!', data);
            
            // Получаем ID звонящего (может быть в разных полях)
            const callerId = data.sender_id || data.target_user_id;
            
            console.log('Caller ID determination:', {
                sender_id: data.sender_id,
                target_user_id: data.target_user_id,
                final_caller_id: callerId
            });
            
            if (!callerId) {
                console.error('❌ No caller ID in incoming call data');
                console.log('Available fields:', Object.keys(data));
                return;
            }
            
            // Если это ответ на наш звонок
            if (data.type === 'answer' && peers[callerId]) {
                console.log('Processing answer for our call');
                peers[callerId].signal(data);
                return;
            }
            
            // Если это предложение звонка (offer)
            if (data.type === 'offer') {
                console.log('Processing incoming offer from user', callerId);
                
                // Находим информацию о звонящем
                fetch(`/api/contacts`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                })
                .then(res => res.json())
                .then(contacts => {
                    console.log('All contacts:', contacts);
                    const caller = contacts.find(c => c.id == callerId);
                    console.log('Found caller:', caller);
                    
                    if (!caller) {
                        // Создаем временного пользователя для уведомления
                        const tempCaller = {
                            id: callerId,
                            full_name: `User ${callerId}`,
                            username: `#user${callerId}`
                        };
                        showIncomingCallNotification(tempCaller, data);
                    } else {
                        showIncomingCallNotification(caller, data);
                    }
                    
                    // Воспроизводим звук звонка
                    playRingtone();
                    
                    // Автоматически отклоняем через 30 секунд
                    incomingCallTimeout = setTimeout(() => {
                        console.log('⏰ Call timeout after 30 seconds');
                        hideIncomingCallNotification();
                        stopRingtone();
                        
                        if (ws && ws.readyState === WebSocket.OPEN) {
                            ws.send(JSON.stringify({
                                type: 'call-rejected',
                                target_user_id: callerId
                            }));
                        }
                    }, 30000);
                })
                .catch(err => {
                    console.error('❌ Error fetching contacts:', err);
                    // В случае ошибки все равно показываем уведомление
                    const tempCaller = {
                        id: callerId,
                        full_name: `User ${callerId}`,
                        username: `#user${callerId}`
                    };
                    showIncomingCallNotification(tempCaller, data);
                    playRingtone();
                });
            }
        }
        
        // Показать уведомление о входящем звонке
        function showIncomingCallNotification(caller, offerData) {
            // Удаляем предыдущее уведомление
            hideIncomingCallNotification();
            
            const notification = document.createElement('div');
            notification.className = 'incoming-call';
            notification.id = 'incomingCall';
            notification.innerHTML = `
                <div class="incoming-call-header">
                    <div class="incoming-call-avatar">${caller.full_name.charAt(0).toUpperCase()}</div>
                    <div class="incoming-call-info">
                        <h3>${caller.full_name}</h3>
                        <p>${caller.username}</p>
                    </div>
                </div>
                <div class="incoming-call-buttons">
                    <button class="accept-call" onclick="acceptCall(${caller.id}, '${caller.full_name}')">✅ Принять</button>
                    <button class="reject-call" onclick="rejectCall(${caller.id})">❌ Отклонить</button>
                </div>
            `;
            
            incomingCallContainer.appendChild(notification);
            
            // Сохраняем offer данные для ответа
            window.pendingCall = {
                callerId: caller.id,
                offerData: offerData
            };
        }
        
        // Скрыть уведомление о входящем звонке
        function hideIncomingCallNotification() {
            const existing = document.getElementById('incomingCall');
            if (existing) {
                existing.remove();
            }
            if (incomingCallTimeout) {
                clearTimeout(incomingCallTimeout);
                incomingCallTimeout = null;
            }
        }
        
        // Принять звонок
        async function acceptCall(callerId, callerName) {
            try {
                hideIncomingCallNotification();
                stopRingtone();
                
                if (activeCall) {
                    alert('У вас уже есть активный звонок');
                    rejectCall(callerId);
                    return;
                }
                
                // Получаем доступ к камере и микрофону
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: true, 
                    audio: true 
                });
                localVideo.srcObject = localStream;
                
                // Создаем peer-соединение (не инициатор)
                const peer = new SimplePeer({
                    initiator: false,
                    stream: localStream,
                    trickle: false,
                    config: {
                        iceServers: [
                            { urls: 'stun:stun.l.google.com:19302' },
                            { urls: 'stun:global.stun.twilio.com:3478' }
                        ]
                    }
                });
                
                peers[callerId] = peer;
                activeCall = {
                    userId: callerId,
                    userName: callerName,
                    peer: peer
                };
                
                // Обработка сигнальных данных
                peer.on('signal', (data) => {
                    console.log('Signal data:', data.type);
                    
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({
                            type: data.type,
                            sender_id: currentUserId,
                            target_user_id: callerId,
                            sdp: data.sdp,
                            candidate: data.candidate
                        }));
                    }
                });
                
                // Получение потока от собеседника
                peer.on('stream', (stream) => {
                    console.log('✅ Received remote stream');
                    remoteVideo.srcObject = stream;
                });
                
                // Отправляем offer данные в peer
                if (window.pendingCall && window.pendingCall.offerData) {
                    console.log('Sending offer data to peer');
                    peer.signal(window.pendingCall.offerData);
                }
                
                // Показываем модальное окно
                document.getElementById('remoteVideoLabel').textContent = callerName;
                callModal.style.display = 'block';
                
                window.pendingCall = null;
                
            } catch (err) {
                console.error('Error accepting call:', err);
                alert('Не удалось получить доступ к камере/микрофону');
            }
        }
        
        // Отклонить звонок
        function rejectCall(callerId) {
            hideIncomingCallNotification();
            stopRingtone();
            
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'call-rejected',
                    target_user_id: callerId
                }));
            }
            
            window.pendingCall = null;
        }
        
        // Обработка ICE кандидата
        function handleIceCandidate(data) {
            console.log('Received ICE candidate from user', data.sender_id);
            if (peers[data.sender_id]) {
                peers[data.sender_id].signal(data);
            }
        }
        
        // Обработка отклоненного звонка
        function handleCallRejected(data) {
            console.log('Call rejected by user', data.sender_id);
            
            // Убираем индикатор звонка
            const callButtons = document.querySelectorAll('.call-button');
            callButtons.forEach(btn => btn.classList.remove('ringing'));
            
            alert('Пользователь отклонил звонок');
            endCall();
        }
        
        // Завершение звонка
        function endCall() {
            console.log('Ending call');
            
            // Останавливаем локальный стрим
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            
            // Уничтожаем все peer-соединения
            Object.values(peers).forEach(peer => peer.destroy());
            peers = {};
            
            // Очищаем видео
            if (localVideo.srcObject) {
                localVideo.srcObject.getTracks().forEach(track => track.stop());
                localVideo.srcObject = null;
            }
            if (remoteVideo.srcObject) {
                remoteVideo.srcObject.getTracks().forEach(track => track.stop());
                remoteVideo.srcObject = null;
            }
            
            // Убираем индикатор звонка
            const callButtons = document.querySelectorAll('.call-button');
            callButtons.forEach(btn => btn.classList.remove('ringing'));
            
            // Закрываем модальное окно
            callModal.style.display = 'none';
            
            activeCall = null;
            window.pendingCall = null;
            
            // Останавливаем рингтон
            stopRingtone();
        }
        
        // ========== ЗВУКОВЫЕ УВЕДОМЛЕНИЯ ==========
        let ringtone = null;
        
        function playRingtone() {
            try {
                if (!ringtone) {
                    // Создаем простой звук с помощью Web Audio API
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    const audioCtx = new AudioContext();
                    
                    const oscillator = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(440, audioCtx.currentTime);
                    
                    gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
                    gainNode.gain.setValueAtTime(0, audioCtx.currentTime + 0.5);
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    
                    oscillator.start();
                    
                    ringtone = {
                        stop: () => {
                            oscillator.stop();
                            audioCtx.close();
                        }
                    };
                    
                    // Повторяем каждые 3 секунды
                    window.ringtoneInterval = setInterval(() => {
                        if (audioCtx.state === 'suspended') {
                            audioCtx.resume();
                        }
                        oscillator.start();
                    }, 3000);
                }
            } catch (e) {
                console.log('Ringtone not supported');
            }
        }
        
        function stopRingtone() {
            if (ringtone) {
                ringtone.stop();
                ringtone = null;
            }
            if (window.ringtoneInterval) {
                clearInterval(window.ringtoneInterval);
                window.ringtoneInterval = null;
            }
        }
        
        // Инициализация
        document.addEventListener('DOMContentLoaded', async () => {
            console.log('Page loaded, currentUserId:', currentUserId);
            
            if (!token) {
                window.location.href = '/login';
                return;
            }
            
            try {
                await loadContacts();
                connectWebSocket();
            } catch (err) {
                console.error('Error during initialization:', err);
            }
            
            // Обработчики отправки сообщений
            document.getElementById('sendMessageBtn').onclick = sendMessage;
            document.getElementById('messageInput').onkeypress = (e) => {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            };
            
            // Обработчики звонков
            document.getElementById('muteAudioBtn').onclick = () => {
                if (localStream) {
                    const audioTrack = localStream.getAudioTracks()[0];
                    if (audioTrack) {
                        audioTrack.enabled = !audioTrack.enabled;
                        document.getElementById('muteAudioBtn').style.opacity = 
                            audioTrack.enabled ? '1' : '0.5';
                    }
                }
            };
            
            document.getElementById('muteVideoBtn').onclick = () => {
                if (localStream) {
                    const videoTrack = localStream.getVideoTracks()[0];
                    if (videoTrack) {
                        videoTrack.enabled = !videoTrack.enabled;
                        document.getElementById('muteVideoBtn').style.opacity = 
                            videoTrack.enabled ? '1' : '0.5';
                    }
                }
            };
            
            // Обработка закрытия модального окна
            window.onclick = (event) => {
                if (event.target === callModal) {
                    endCall();
                }
            };
        });
    </script>
</body>
