<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEBULA - Мессенджер будущего</title>
    <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
    <style>
        /* ========== СБРОС И ГЛОБАЛЬНЫЕ СТИЛИ ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        /* ========== АНИМИРОВАННЫЙ ФОН ========== */
        body {
            height: 100vh;
            display: flex;
            overflow: hidden;
            position: relative;
            background: #0a0f1e;
        }

        /* Анимированные частицы фона */
        .particle-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea20, #764ba220);
            pointer-events: none;
            animation: float 20s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); }
            25% { transform: translateY(-20px) translateX(10px); }
            50% { transform: translateY(-30px) translateX(-10px); }
            75% { transform: translateY(-10px) translateX(20px); }
        }

        /* Градиентный оверлей */
        .gradient-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(102, 126, 234, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(118, 75, 162, 0.1) 0%, transparent 50%);
            z-index: -1;
            animation: pulse-gradient 8s infinite alternate;
        }

        @keyframes pulse-gradient {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* ========== ОСНОВНОЙ ИНТЕРФЕЙС ========== */
        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        /* ========== САЙДБАР ========== */
        .contacts-sidebar {
            width: 350px;
            background: rgba(20, 25, 40, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            box-shadow: 5px 0 30px rgba(0, 0, 0, 0.5);
        }

        .contacts-sidebar::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, #667eea, #764ba2, #667eea);
            animation: border-flow 3s linear infinite;
            background-size: 200% 100%;
        }

        @keyframes border-flow {
            0% { background-position: 0% 0; }
            100% { background-position: 200% 0; }
        }

        .contacts-header {
            padding: 25px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .contacts-header h2 {
            color: white;
            font-size: 1.8em;
            margin-bottom: 15px;
            font-weight: 700;
            text-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
            letter-spacing: -0.5px;
        }

        /* Профиль пользователя */
        .user-info {
            display: flex;
            align-items: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .user-info::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .user-info:hover::before {
            left: 100%;
        }

        .user-info:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            border-color: #667eea;
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            margin-right: 15px;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
            animation: glow 3s infinite alternate;
        }

        @keyframes glow {
            0% { box-shadow: 0 0 20px rgba(102, 126, 234, 0.5); }
            100% { box-shadow: 0 0 40px rgba(118, 75, 162, 0.8); }
        }

        .user-details {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
            color: white;
            font-size: 16px;
        }

        .user-username {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
        }

        /* Статус онлайн */
        .online-status {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4CAF50;
            margin-left: 10px;
            box-shadow: 0 0 10px #4CAF50;
            animation: pulse-online 2s infinite;
        }

        @keyframes pulse-online {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* Вкладки */
        .tabs {
            display: flex;
            padding: 10px;
            gap: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.6);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
        }

        .tab::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .tab:hover::before {
            left: 100%;
        }

        .tab:hover {
            background: rgba(102, 126, 234, 0.2);
            color: white;
            transform: translateY(-2px);
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            animation: tab-glow 2s infinite alternate;
        }

        @keyframes tab-glow {
            0% { box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); }
            100% { box-shadow: 0 5px 30px rgba(118, 75, 162, 0.6); }
        }

        /* Кнопка создания группы */
        .create-group-btn {
            margin: 15px;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3);
        }

        .create-group-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .create-group-btn:hover::before {
            left: 100%;
        }

        .create-group-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.6);
        }

        /* Списки контактов и групп */
        .contacts-list, .groups-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            scrollbar-width: thin;
            scrollbar-color: #667eea rgba(255, 255, 255, 0.1);
        }

        .contacts-list::-webkit-scrollbar, .groups-list::-webkit-scrollbar {
            width: 5px;
        }

        .contacts-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .contacts-list::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
        }

        /* Элементы контактов и групп */
        .contact-item, .group-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .contact-item::before, .group-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            transition: left 0.5s ease;
        }

        .contact-item:hover::before, .group-item:hover::before {
            left: 100%;
        }

        .contact-item:hover, .group-item:hover {
            background: rgba(102, 126, 234, 0.1);
            border-color: #667eea;
            transform: translateX(5px);
            box-shadow: -5px 5px 20px rgba(0, 0, 0, 0.3);
        }

        .contact-item.active, .group-item.active {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(118, 75, 162, 0.2));
            border-color: #667eea;
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.3);
        }

        .contact-item.online .contact-avatar, .group-item.in-call .group-avatar {
            box-shadow: 0 0 20px #4CAF50;
            animation: online-pulse 2s infinite;
        }

        @keyframes online-pulse {
            0% { box-shadow: 0 0 20px #4CAF50; }
            50% { box-shadow: 0 0 40px #4CAF50; }
            100% { box-shadow: 0 0 20px #4CAF50; }
        }

        .contact-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            margin-right: 15px;
            transition: all 0.3s ease;
        }

        .group-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff9800, #f44336);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            margin-right: 15px;
            transition: all 0.3s ease;
        }

        .contact-info, .group-info {
            flex: 1;
        }

        .contact-name, .group-name {
            font-weight: 600;
            color: white;
            margin-bottom: 5px;
            font-size: 16px;
        }

        .contact-username, .group-members {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
        }

        .unread-badge {
            background: linear-gradient(135deg, #f44336, #ff9800);
            color: white;
            border-radius: 50%;
            min-width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
            box-shadow: 0 0 15px rgba(244, 67, 54, 0.5);
            animation: unread-pulse 2s infinite;
        }

        @keyframes unread-pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .call-button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
            border: 1px solid rgba(76, 175, 80, 0.3);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.3s ease;
            margin-left: 10px;
        }

        .call-button:hover {
            background: #4CAF50;
            color: white;
            transform: scale(1.1);
            box-shadow: 0 0 20px #4CAF50;
        }

        .call-button.in-call {
            background: #f44336;
            color: white;
            border-color: #f44336;
            animation: in-call-pulse 1.5s infinite;
        }

        @keyframes in-call-pulse {
            0% { box-shadow: 0 0 0 0 rgba(244, 67, 54, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(244, 67, 54, 0); }
            100% { box-shadow: 0 0 0 0 rgba(244, 67, 54, 0); }
        }

        /* ========== ОСНОВНАЯ ОБЛАСТЬ ЧАТА ========== */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(10, 15, 30, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: relative;
        }

        .chat-area::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, #667eea, #764ba2, #667eea);
            animation: border-flow 3s linear infinite;
            background-size: 200% 100%;
        }

        /* Шапка чата */
        .chat-header {
            padding: 25px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(20, 25, 40, 0.5);
            backdrop-filter: blur(10px);
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-header-name {
            font-size: 1.5em;
            font-weight: 700;
            color: white;
            margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
        }

        .chat-header-meta {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }

        .chat-header-actions {
            display: flex;
            gap: 15px;
        }

        .members-list-btn, .group-call-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .members-list-btn {
            background: rgba(102, 126, 234, 0.2);
            color: #667eea;
            border: 1px solid rgba(102, 126, 234, 0.3);
        }

        .group-call-btn {
            background: linear-gradient(135deg, #ff9800, #f44336);
            color: white;
            box-shadow: 0 5px 20px rgba(255, 152, 0, 0.3);
        }

        .members-list-btn:hover, .group-call-btn:hover {
            transform: translateY(-2px);
        }

        .members-list-btn:hover {
            background: rgba(102, 126, 234, 0.3);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3);
        }

        .group-call-btn:hover {
            box-shadow: 0 10px 30px rgba(244, 67, 54, 0.5);
        }

        .group-call-btn.active {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Контейнер сообщений */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Стили сообщений */
        .message {
            max-width: 60%;
            margin-bottom: 10px;
            padding: 15px 20px;
            border-radius: 25px;
            position: relative;
            word-wrap: break-word;
            animation: message-appear 0.3s ease;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        @keyframes message-appear {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.sent {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-bottom-right-radius: 5px;
        }

        .message.received {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-bottom-left-radius: 5px;
        }

        .message.group-message {
            align-self: flex-start;
            background: rgba(255, 152, 0, 0.2);
            color: white;
            border-left: 3px solid #ff9800;
        }

        .message-sender {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 5px;
            color: #ff9800;
        }

        .message-time {
            font-size: 11px;
            margin-top: 8px;
            opacity: 0.7;
            text-align: right;
        }

        .message.sent .message-time {
            color: rgba(255, 255, 255, 0.8);
        }

        /* Область ввода сообщения */
        .message-input-area {
            padding: 25px 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 15px;
            background: rgba(20, 25, 40, 0.5);
            backdrop-filter: blur(10px);
        }

        .message-input {
            flex: 1;
            padding: 15px 25px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .message-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.3);
            background: rgba(255, 255, 255, 0.1);
        }

        .message-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .send-button {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3);
        }

        .send-button:hover {
            transform: scale(1.1) rotate(90deg);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.6);
        }

        /* ========== МОДАЛЬНЫЕ ОКНА ========== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            animation: modal-appear 0.3s ease;
        }

        @keyframes modal-appear {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-content {
            position: relative;
            width: 90%;
            max-width: 500px;
            margin: 100px auto;
            background: rgba(20, 25, 40, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-title {
            font-size: 1.5em;
            font-weight: 700;
            color: white;
            text-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
        }

        .close-modal {
            font-size: 30px;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
        }

        .close-modal:hover {
            color: #f44336;
            transform: rotate(90deg);
        }

        .modal-body {
            margin-bottom: 25px;
        }

        .modal-body input, .modal-body textarea, .modal-body select {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            transition: all 0.3s ease;
        }

        .modal-body input:focus, .modal-body textarea:focus, .modal-body select:focus {
            border-color: #667eea;
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.3);
            outline: none;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
        }

        .modal-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .modal-btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .modal-btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .modal-btn:hover {
            transform: translateY(-2px);
        }

        .modal-btn-primary:hover {
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.5);
        }

        /* Список участников */
        .members-list {
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
        }

        .member-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.03);
            transition: all 0.3s ease;
        }

        .member-item:hover {
            background: rgba(102, 126, 234, 0.1);
            transform: translateX(5px);
        }

        .member-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
        }

        .member-info {
            flex: 1;
        }

        .member-name {
            font-weight: 600;
            color: white;
            margin-bottom: 3px;
        }

        .member-username {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }

        .member-role {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 10px;
            background: rgba(255, 152, 0, 0.2);
            color: #ff9800;
            margin-left: 10px;
        }

        .member-call-status {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 10px;
            margin-left: 10px;
        }

        .member-call-status.in-call {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
            animation: pulse-online 2s infinite;
        }

        /* Модальное окно звонка */
        .call-modal {
            max-width: 1200px;
            width: 95%;
        }

        .group-video-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            min-height: 500px;
            max-height: 70vh;
            overflow-y: auto;
            padding: 15px;
        }

        .video-wrapper {
            position: relative;
            background: #1a1a1a;
            border-radius: 20px;
            overflow: hidden;
            aspect-ratio: 16/9;
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .video-wrapper:hover {
            border-color: #667eea;
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.5);
        }

        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-label {
            position: absolute;
            bottom: 15px;
            left: 15px;
            color: white;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 13px;
            z-index: 1;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .call-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 60px;
        }

        .call-button-end, .call-button-mute {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 24px;
            transition: all 0.3s ease;
        }

        .call-button-end {
            background: #f44336;
            color: white;
            box-shadow: 0 5px 20px rgba(244, 67, 54, 0.5);
        }

        .call-button-mute {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .call-button-end:hover, .call-button-mute:hover {
            transform: scale(1.1);
        }

        .call-button-end:hover {
            box-shadow: 0 10px 30px rgba(244, 67, 54, 0.8);
        }

        .call-button-mute:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .call-button-mute.muted {
            background: #f44336;
        }

        .participants-count {
            background: rgba(102, 126, 234, 0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            border: 1px solid rgba(102, 126, 234, 0.3);
        }

        /* Уведомления о входящих звонках */
        .incoming-call {
            position: fixed;
            top: 30px;
            right: 30px;
            background: rgba(20, 25, 40, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            padding: 25px;
            z-index: 2000;
            animation: slide-in 0.3s ease;
            min-width: 350px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 4px solid #4CAF50;
        }

        @keyframes slide-in {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .incoming-call-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .incoming-call-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            margin-right: 20px;
            animation: call-pulse 1.5s infinite;
        }

        @keyframes call-pulse {
            0% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(76, 175, 80, 0); }
            100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0); }
        }

        .incoming-call-info h3 {
            margin: 0 0 5px;
            color: white;
            font-size: 1.3em;
        }

        .incoming-call-info p {
            margin: 0;
            color: rgba(255, 255, 255, 0.6);
        }

        .incoming-call-buttons {
            display: flex;
            gap: 15px;
        }

        .accept-call, .reject-call {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .accept-call {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
        }

        .reject-call {
            background: linear-gradient(135deg, #f44336, #d32f2f);
            color: white;
        }

        .accept-call:hover, .reject-call:hover {
            transform: translateY(-2px);
        }

        .accept-call:hover {
            box-shadow: 0 5px 20px rgba(76, 175, 80, 0.5);
        }

        .reject-call:hover {
            box-shadow: 0 5px 20px rgba(244, 67, 54, 0.5);
        }

        /* Статус WebSocket */
        .ws-status {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 12px 24px;
            border-radius: 30px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            z-index: 1001;
            display: none;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .ws-status.connected {
            background: rgba(76, 175, 80, 0.9);
            display: block;
            animation: status-pulse 2s infinite;
        }

        .ws-status.disconnected {
            background: rgba(244, 67, 54, 0.9);
            display: block;
        }

        .ws-status.reconnecting {
            background: rgba(255, 152, 0, 0.9);
            display: block;
            animation: status-pulse 1s infinite;
        }

        @keyframes status-pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        /* Служебные классы */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- Анимированный фон -->
    <div class="particle-background" id="particleBackground"></div>
    <div class="gradient-overlay"></div>

    <div class="app-container">
        <!-- Сайдбар -->
        <div class="contacts-sidebar">
            <div class="contacts-header">
                <h2>✨ NEBULA</h2>
                <div class="user-info" id="currentUserInfo">
                    <div class="user-avatar" id="currentUserAvatar"></div>
                    <div class="user-details">
                        <div class="user-name" id="currentUserName">Загрузка...</div>
                        <div class="user-username" id="currentUserUsername"></div>
                    </div>
                    <span class="online-status" id="onlineStatus"></span>
                </div>
            </div>
            
            <div class="tabs">
                <div class="tab active" onclick="switchTab('chats')">💬 Чаты</div>
                <div class="tab" onclick="switchTab('groups')">👥 Группы</div>
            </div>
            
            <button class="create-group-btn" id="createGroupBtn" style="display: none;">✨ Создать группу</button>
            
            <div class="contacts-list" id="contactsList"></div>
            <div class="groups-list" id="groupsList" style="display: none;"></div>
        </div>
        
        <!-- Основная область чата -->
        <div class="chat-area">
            <div class="chat-header" id="chatHeader" style="display: none;">
                <div class="chat-header-info">
                    <div class="chat-header-name" id="chatHeaderName"></div>
                    <div class="chat-header-meta" id="chatHeaderMeta"></div>
                </div>
                <div class="chat-header-actions" id="chatHeaderActions"></div>
            </div>
            
            <div class="messages-container" id="messagesContainer"></div>
            
            <div class="message-input-area" id="messageInputArea" style="display: none;">
                <input type="text" class="message-input" id="messageInput" placeholder="Напишите сообщение...">
                <button class="send-button" id="sendMessageBtn">➤</button>
            </div>
        </div>
    </div>
    
    <!-- Модальные окна -->
    <div class="modal" id="createGroupModal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title">✨ Создать группу</span>
                <span class="close-modal" onclick="closeCreateGroupModal()">&times;</span>
            </div>
            <div class="modal-body">
                <input type="text" id="groupName" placeholder="Название группы">
                <textarea id="groupDescription" placeholder="Описание группы (необязательно)" rows="3"></textarea>
            </div>
            <div class="modal-footer">
                <button class="modal-btn modal-btn-secondary" onclick="closeCreateGroupModal()">Отмена</button>
                <button class="modal-btn modal-btn-primary" onclick="createGroup()">Создать</button>
            </div>
        </div>
    </div>
    
    <div class="modal" id="groupMembersModal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title" id="groupMembersTitle">Участники группы</span>
                <span class="close-modal" onclick="closeGroupMembersModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="members-list" id="groupMembersList"></div>
                <div style="margin-top: 20px;">
                    <select id="addMemberSelect" style="width: calc(100% - 90px); display: inline-block;">
                        <option value="">Выберите пользователя...</option>
                    </select>
                    <button class="modal-btn modal-btn-primary" style="width: 80px;" onclick="addGroupMember()">➕</button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="modal" id="groupCallModal">
        <div class="modal-content call-modal">
            <div class="modal-header">
                <span class="modal-title" id="groupCallTitle">Групповой звонок</span>
                <span class="close-modal" onclick="endGroupCall()">&times;</span>
                <span class="participants-count" id="participantsCount">1 участник</span>
            </div>
            <div class="group-video-container" id="groupVideoContainer"></div>
            <div class="call-controls">
                <button class="call-button-mute" id="groupMuteAudioBtn" onclick="toggleGroupAudio()">🎤</button>
                <button class="call-button-end" onclick="endGroupCall()">📞</button>
                <button class="call-button-mute" id="groupMuteVideoBtn" onclick="toggleGroupVideo()">📹</button>
            </div>
        </div>
    </div>
    
    <div class="modal" id="callModal">
        <div class="modal-content call-modal" style="max-width: 800px;">
            <div class="modal-header">
                <span class="modal-title" id="callModalTitle">Видеозвонок</span>
                <span class="close-modal" onclick="endCall()">&times;</span>
            </div>
            <div class="group-video-container" style="grid-template-columns: 1fr 1fr;">
                <div class="video-wrapper">
                    <video id="localVideo" autoplay muted playsinline></video>
                    <div class="video-label">Вы</div>
                </div>
                <div class="video-wrapper">
                    <video id="remoteVideo" autoplay playsinline></video>
                    <div class="video-label" id="remoteVideoLabel">Собеседник</div>
                </div>
            </div>
            <div class="call-controls">
                <button class="call-button-mute" id="muteAudioBtn">🎤</button>
                <button class="call-button-end" onclick="endCall()">📞</button>
                <button class="call-button-mute" id="muteVideoBtn">📹</button>
            </div>
        </div>
    </div>
    
    <div class="ws-status" id="wsStatus">Статус подключения</div>
    <div id="incomingCallContainer"></div>

    <script>
        // Функция для создания анимированных частиц фона
        function createParticles() {
            const container = document.getElementById('particleBackground');
            const particleCount = 50;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                const size = Math.random() * 5 + 2;
                const left = Math.random() * 100;
                const top = Math.random() * 100;
                const delay = Math.random() * 20;
                const duration = Math.random() * 10 + 10;
                
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = left + '%';
                particle.style.top = top + '%';
                particle.style.animationDelay = delay + 's';
                particle.style.animationDuration = duration + 's';
                particle.style.opacity = Math.random() * 0.3;
                
                container.appendChild(particle);
            }
        }

        // Вызываем при загрузке
        window.onload = function() {
            createParticles();
        };

        // Здесь вставь весь существующий JavaScript код из предыдущей версии

        // но он остается точно таким же, как в предыдущей версии
        
        // Краткое напоминание: нужно скопировать все функции из старого chat.html
        // в этот новый файл, в секцию <script>
        
        console.log('✨ NEBULA Messenger - готов к работе!');
    </script>
</body>
</html>
