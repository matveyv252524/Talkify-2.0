<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат - Мессенджер</title>
    <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }
        
        body {
            height: 100vh;
            display: flex;
            overflow: hidden;
            background: #f0f2f5;
        }
        
        .contacts-sidebar {
            width: 300px;
            background: white;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }
        
        .contacts-header {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .contacts-header h2 {
            color: #333;
            font-size: 1.5em;
            margin-bottom: 10px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 10px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 10px;
        }
        
        .user-details {
            flex: 1;
        }
        
        .user-name {
            font-weight: 600;
        }
        
        .user-username {
            font-size: 12px;
            color: #666;
        }
        
        .tabs {
            display: flex;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            background: #f8f9fa;
        }
        
        .tab:hover {
            background: #e9ecef;
        }
        
        .tab.active {
            background: white;
            color: #667eea;
            border-bottom: 2px solid #667eea;
        }
        
        .create-group-btn {
            margin: 10px;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        
        .create-group-btn:hover {
            background: #5a6fd8;
        }
        
        .contacts-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        
        .contact-item, .group-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 5px;
        }
        
        .contact-item:hover, .group-item:hover {
            background: #f5f5f5;
        }
        
        .contact-item.active, .group-item.active {
            background: #e8eaf6;
        }
        
        .contact-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #4CAF50;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 10px;
        }
        
        .group-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #ff9800;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 10px;
        }
        
        .contact-info, .group-info {
            flex: 1;
        }
        
        .contact-name, .group-name {
            font-weight: 500;
        }
        
        .contact-username, .group-members {
            font-size: 12px;
            color: #666;
        }
        
        .call-button {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: transform 0.2s;
        }
        
        .call-button:hover {
            transform: scale(1.1);
        }
        
        .call-button.ringing {
            animation: ring 1s infinite;
            background: #ff9800;
        }
        
        .call-button.in-call {
            background: #f44336;
        }
        
        @keyframes ring {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }
        
        .chat-header {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .chat-header-info {
            flex: 1;
        }
        
        .chat-header-name {
            font-size: 1.2em;
            font-weight: 600;
        }
        
        .chat-header-meta {
            color: #666;
            font-size: 14px;
        }
        
        .chat-header-actions {
            display: flex;
            gap: 10px;
        }
        
        .group-call-btn {
            padding: 8px 16px;
            background: #ff9800;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .group-call-btn.active {
            background: #f44336;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .members-list-btn {
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        
        .message {
            max-width: 60%;
            margin-bottom: 10px;
            padding: 10px 15px;
            border-radius: 18px;
            position: relative;
            word-wrap: break-word;
        }
        
        .message.sent {
            align-self: flex-end;
            background: #667eea;
            color: white;
        }
        
        .message.received {
            align-self: flex-start;
            background: #f0f2f5;
            color: #333;
        }
        
        .message.group-message {
            align-self: flex-start;
            background: #e3f2fd;
            color: #333;
        }
        
        .message-sender {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #555;
        }
        
        .message-time {
            font-size: 11px;
            margin-top: 5px;
            opacity: 0.7;
        }
        
        .message-input-area {
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }
        
        .message-input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .message-input:focus {
            border-color: #667eea;
        }
        
        .send-button {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .send-button:hover {
            background: #5a6fd8;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }
        
        .modal-content {
            position: relative;
            width: 90%;
            max-width: 500px;
            margin: 100px auto;
            background: white;
            border-radius: 10px;
            padding: 20px;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-title {
            font-size: 1.2em;
            font-weight: 600;
        }
        
        .close-modal {
            font-size: 24px;
            cursor: pointer;
            color: #666;
        }
        
        .modal-body {
            margin-bottom: 20px;
        }
        
        .modal-body input, .modal-body textarea, .modal-body select {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
        }
        
        .modal-body input:focus, .modal-body textarea:focus, .modal-body select:focus {
            border-color: #667eea;
            outline: none;
        }
        
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        
        .modal-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .modal-btn-primary {
            background: #667eea;
            color: white;
        }
        
        .modal-btn-secondary {
            background: #e0e0e0;
            color: #333;
        }
        
        .members-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .member-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .member-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #4CAF50;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
        }
        
        .member-info {
            flex: 1;
        }
        
        .member-name {
            font-weight: 500;
        }
        
        .member-username {
            font-size: 12px;
            color: #666;
        }
        
        .member-role {
            font-size: 12px;
            color: #ff9800;
            margin-left: 10px;
        }
        
        .remove-member-btn {
            color: #f44336;
            cursor: pointer;
            margin-left: 10px;
        }
        
        .member-call-status {
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 12px;
            margin-left: 10px;
        }
        
        .member-call-status.in-call {
            background: #4CAF50;
            color: white;
        }
        
        .member-call-status.joining {
            background: #ff9800;
            color: white;
        }
        
        .call-modal {
            max-width: 1200px;
            width: 95%;
        }
        
        .group-video-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 10px;
            min-height: 500px;
            max-height: 70vh;
            overflow-y: auto;
            padding: 10px;
        }
        
        .video-wrapper {
            position: relative;
            background: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            aspect-ratio: 16/9;
        }
        
        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .video-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            z-index: 1;
        }
        
        .video-muted-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 5px;
            border-radius: 50%;
            font-size: 12px;
            z-index: 1;
        }
        
        .call-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 10px;
        }
        
        .call-button-end {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #f44336;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 24px;
        }
        
        .call-button-mute {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #666;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 24px;
        }
        
        .call-button-mute.muted {
            background: #f44336;
        }
        
        .participants-count {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #667eea;
            color: white;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 14px;
        }
        
        .ws-status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            font-size: 14px;
            z-index: 1001;
            display: none;
        }
        
        .ws-status.connected {
            background: #4CAF50;
            display: block;
        }
        
        .ws-status.disconnected {
            background: #f44336;
            display: block;
        }
        
        .ws-status.reconnecting {
            background: #ff9800;
            display: block;
        }
        
        .incoming-call {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            padding: 20px;
            z-index: 2000;
            animation: slideIn 0.3s;
            min-width: 300px;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .incoming-call-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .incoming-call-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            margin-right: 15px;
        }
        
        .incoming-call-info h3 {
            margin: 0;
            color: #333;
        }
        
        .incoming-call-info p {
            margin: 5px 0 0;
            color: #666;
        }
        
        .incoming-call-buttons {
            display: flex;
            gap: 10px;
        }
        
        .accept-call {
            flex: 1;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        
        .reject-call {
            flex: 1;
            padding: 10px;
            background: #f44336;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="contacts-sidebar">
        <div class="contacts-header">
            <h2>📱 Мессенджер</h2>
            <div class="user-info" id="currentUserInfo">
                <div class="user-avatar" id="currentUserAvatar"></div>
                <div class="user-details">
                    <div class="user-name" id="currentUserName">Загрузка...</div>
                    <div class="user-username" id="currentUserUsername"></div>
                </div>
            </div>
        </div>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab('chats')">Чаты</div>
            <div class="tab" onclick="switchTab('groups')">Группы</div>
        </div>
        
        <button class="create-group-btn" id="createGroupBtn" style="display: none;">➕ Создать группу</button>
        
        <div class="contacts-list" id="contactsList"></div>
        <div class="contacts-list" id="groupsList" style="display: none;"></div>
    </div>
    
    <div class="chat-area">
        <div class="chat-header" id="chatHeader" style="display: none;">
            <div class="chat-header-info">
                <div class="chat-header-name" id="chatHeaderName"></div>
                <div class="chat-header-meta" id="chatHeaderMeta"></div>
            </div>
            <div class="chat-header-actions" id="chatHeaderActions"></div>
        </div>
        
        <div class="messages-container" id="messagesContainer"></div>
        
        <div class="message-input-area" id="messageInputArea" style="display: none;">
            <input type="text" class="message-input" id="messageInput" placeholder="Введите сообщение...">
            <button class="send-button" id="sendMessageBtn">➤</button>
        </div>
    </div>
    
    <!-- Модальное окно создания группы -->
    <div class="modal" id="createGroupModal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title">Создать группу</span>
                <span class="close-modal" onclick="closeCreateGroupModal()">&times;</span>
            </div>
            <div class="modal-body">
                <input type="text" id="groupName" placeholder="Название группы">
                <textarea id="groupDescription" placeholder="Описание группы (необязательно)" rows="3"></textarea>
            </div>
            <div class="modal-footer">
                <button class="modal-btn modal-btn-secondary" onclick="closeCreateGroupModal()">Отмена</button>
                <button class="modal-btn modal-btn-primary" onclick="createGroup()">Создать</button>
            </div>
        </div>
    </div>
    
    <!-- Модальное окно участников группы -->
    <div class="modal" id="groupMembersModal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title" id="groupMembersTitle">Участники группы</span>
                <span class="close-modal" onclick="closeGroupMembersModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="members-list" id="groupMembersList"></div>
                <div style="margin-top: 10px;">
                    <select id="addMemberSelect" style="width: calc(100% - 80px); display: inline-block;">
                        <option value="">Выберите пользователя...</option>
                    </select>
                    <button class="modal-btn modal-btn-primary" style="width: 70px;" onclick="addGroupMember()">➕</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Модальное окно группового звонка -->
    <div class="modal" id="groupCallModal">
        <div class="modal-content call-modal">
            <div class="modal-header">
                <span class="modal-title" id="groupCallTitle">Групповой звонок</span>
                <span class="close-modal" onclick="endGroupCall()">&times;</span>
                <span class="participants-count" id="participantsCount">1 участник</span>
            </div>
            <div class="group-video-container" id="groupVideoContainer"></div>
            <div class="call-controls">
                <button class="call-button-mute" id="groupMuteAudioBtn" onclick="toggleGroupAudio()">🎤</button>
                <button class="call-button-end" onclick="endGroupCall()">📞</button>
                <button class="call-button-mute" id="groupMuteVideoBtn" onclick="toggleGroupVideo()">📹</button>
            </div>
        </div>
    </div>
    
    <!-- Модальное окно личного звонка -->
    <div class="modal" id="callModal">
        <div class="modal-content call-modal" style="max-width: 800px;">
            <div class="modal-header">
                <span class="modal-title" id="callModalTitle">Видеозвонок</span>
                <span class="close-modal" onclick="endCall()">&times;</span>
            </div>
            <div class="group-video-container" style="grid-template-columns: 1fr 1fr;">
                <div class="video-wrapper">
                    <video id="localVideo" autoplay muted playsinline></video>
                    <div class="video-label">Вы</div>
                </div>
                <div class="video-wrapper">
                    <video id="remoteVideo" autoplay playsinline></video>
                    <div class="video-label" id="remoteVideoLabel">Собеседник</div>
                </div>
            </div>
            <div class="call-controls">
                <button class="call-button-mute" id="muteAudioBtn">🎤</button>
                <button class="call-button-end" onclick="endCall()">📞</button>
                <button class="call-button-mute" id="muteVideoBtn">📹</button>
            </div>
        </div>
    </div>
    
    <div class="ws-status" id="wsStatus">Статус подключения</div>
    <div id="incomingCallContainer"></div>

    <script>
        // Глобальные переменные
        let currentUserId = null;
        let currentUser = null;
        let selectedUserId = null;
        let selectedGroupId = null;
        let currentTab = 'chats';
        let ws = null;
        let peers = {};
        let groupPeers = {};
        let localStream = null;
        let groupCallStream = null;
        let reconnectAttempts = 0;
        const maxReconnectAttempts = 5;
        let activeCall = null;
        let activeGroupCall = null;
        let incomingCallTimeout = null;
        let groups = [];
        let contacts = [];
        let groupMembers = [];
        let groupCallParticipants = {};
        
        // DOM элементы
        const callModal = document.getElementById('callModal');
        const groupCallModal = document.getElementById('groupCallModal');
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const wsStatus = document.getElementById('wsStatus');
        const incomingCallContainer = document.getElementById('incomingCallContainer');
        const createGroupModal = document.getElementById('createGroupModal');
        const groupMembersModal = document.getElementById('groupMembersModal');
        const contactsList = document.getElementById('contactsList');
        const groupsList = document.getElementById('groupsList');
        const groupVideoContainer = document.getElementById('groupVideoContainer');
        
        // Получение токена из localStorage
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/login';
        }
        
        // Декодирование JWT
        function parseJwt(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch(e) {
                console.error('Error parsing JWT:', e);
                return null;
            }
        }
        
        const jwtPayload = parseJwt(token);
        if (jwtPayload && jwtPayload.sub) {
            currentUserId = parseInt(jwtPayload.sub);
            console.log('Current user ID:', currentUserId);
        }
        
        // Функция обновления статуса WebSocket
        function updateWSStatus(status, message) {
            wsStatus.className = 'ws-status ' + status;
            wsStatus.textContent = message || 'Статус подключения';
        }
        
        // Переключение между вкладками
        function switchTab(tab) {
            currentTab = tab;

        // Добавление личного сообщения
        function addPrivateMessageToChat(content, type, timestamp) {
            const container = document.getElementById('messagesContainer');
            const messageEl = document.createElement('div');
            messageEl.className = `message ${type}`;
            
            let timeStr = timestamp ? new Date(timestamp).toLocaleTimeString('ru-RU', {
                hour: '2-digit', minute: '2-digit'
            }) : new Date().toLocaleTimeString('ru-RU', {
                hour: '2-digit', minute: '2-digit'
            });
            
            messageEl.innerHTML = `

                <div class="message-time">${timeStr}</div>
            `;
            
            container.appendChild(messageEl);
            container.scrollTop = container.scrollHeight;
        }
        
        // Добавление группового сообщения
        function addGroupMessageToChat(content, senderName, isMine, timestamp) {
            const container = document.getElementById('messagesContainer');
            const messageEl = document.createElement('div');
            messageEl.className = `message group-message ${isMine ? 'sent' : 'received'}`;
            
            let timeStr = timestamp ? new Date(timestamp).toLocaleTimeString('ru-RU', {
                hour: '2-digit', minute: '2-digit'
            }) : new Date().toLocaleTimeString('ru-RU', {
                hour: '2-digit', minute: '2-digit'
            });
            
            messageEl.innerHTML = `
                ${!isMine ? `<div class="message-sender">${senderName}</div>` : ''}
                ${content}
                <div class="message-time">${timeStr}</div>
            `;
            
            container.appendChild(messageEl);
            container.scrollTop = container.scrollHeight;
        }
        
        // WebSocket соединение
        function connectWebSocket() {
            if (!currentUserId) {
                setTimeout(connectWebSocket, 1000);
                return;
            }
            
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws/${currentUserId}`;
            
            console.log('Connecting to WebSocket:', wsUrl);
            updateWSStatus('reconnecting', 'Подключение...');
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                console.log('✅ WebSocket connected');
                updateWSStatus('connected', '🟢 WebSocket подключен');
                reconnectAttempts = 0;
            };
            
            ws.onerror = (error) => {
                console.error('❌ WebSocket error:', error);
                updateWSStatus('disconnected', '🔴 Ошибка подключения');
            };
            
            ws.onmessage = (event) => {
                console.log('📩 WebSocket message:', event.data);
                try {
                    const data = JSON.parse(event.data);
                    
                    if (data.type === 'message') {
                        if (data.sender_id === selectedUserId) {
                            addPrivateMessageToChat(data.content, 'received', data.timestamp);
                        }
                    } else if (data.type === 'group_message') {
                        if (data.group_id === selectedGroupId) {
                            addGroupMessageToChat(data.content, data.sender_name, false, data.timestamp);
                        }
                    } else if (data.type === 'offer' || data.type === 'answer') {
                        handleCallSignal(data);
                    } else if (data.type === 'ice-candidate') {
                        handleIceCandidate(data);
                    } else if (data.type === 'call-rejected') {
                        handleCallRejected(data);
                    } else if (data.type === 'group_call_offer') {
                        handleGroupCallOffer(data);
                    } else if (data.type === 'group_call_answer') {
                        handleGroupCallAnswer(data);
                    } else if (data.type === 'group_call_ice') {
                        handleGroupCallIce(data);
                    } else if (data.type === 'group_call_leave') {
                        handleGroupCallLeave(data);
                    }
                } catch (e) {
                    console.error('Error parsing message:', e);
                }
            };
            
            ws.onclose = () => {
                console.log('❌ WebSocket disconnected');
                if (reconnectAttempts < maxReconnectAttempts) {
                    reconnectAttempts++;
                    updateWSStatus('reconnecting', `⏳ Переподключение (${reconnectAttempts}/${maxReconnectAttempts})...`);
                    setTimeout(connectWebSocket, 3000);
                } else {
                    updateWSStatus('disconnected', '🔴 Нет соединения');
                }
            };
        }
        
        // Отправка сообщения
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            
            if (!content) return;
            
            if (!selectedUserId && !selectedGroupId) {
                alert('Выберите чат или группу');
                return;
            }
            
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                alert('Нет соединения с сервером');
                return;
            }
            
            if (selectedUserId) {
                ws.send(JSON.stringify({
                    type: 'message',
                    receiver_id: selectedUserId,
                    content: content
                }));
                addPrivateMessageToChat(content, 'sent');
            } else if (selectedGroupId) {
                ws.send(JSON.stringify({
                    type: 'group_message',
                    group_id: selectedGroupId,
                    content: content
                }));
                addGroupMessageToChat(content, 'Вы', true);
            }
            
            input.value = '';
        }

        // ========== ГРУППОВЫЕ ЗВОНКИ ==========
        
        async function startGroupCall(groupId) {
            try {
                console.log('Starting group call for group:', groupId);
                
                if (activeGroupCall) {
                    alert('В группе уже идет звонок');
                    showGroupCall();
                    return;
                }
                
                const membersResponse = await fetch(`/api/groups/${groupId}/members`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!membersResponse.ok) {
                    throw new Error('Failed to get group members');
                }
                
                const members = await membersResponse.json();
                console.log('Group members:', members);
                
                groupCallStream = await navigator.mediaDevices.getUserMedia({ 
                    video: true, 
                    audio: true 
                });
                
                activeGroupCall = {
                    groupId: groupId,
                    participants: members.map(m => m.user_id),
                    startTime: Date.now()
                };
                
                groupCallParticipants = {};
                groupCallParticipants[currentUserId] = {
                    stream: groupCallStream,
                    audioEnabled: true,
                    videoEnabled: true,
                    userName: 'Вы'
                };
                
                for (const member of members) {
                    if (member.user_id !== currentUserId) {
                        await createGroupPeerConnection(member.user_id, member.full_name);
                    }
                }
                
                updateGroupCallUI();
                
                document.getElementById('groupCallTitle').textContent = `Групповой звонок (${members.length} участников)`;
                groupCallModal.style.display = 'block';
                
                if (selectedGroupId === groupId) {
                    const actions = document.getElementById('chatHeaderActions');
                    actions.innerHTML = `
                        <button class="members-list-btn" onclick="showGroupMembers(${groupId})">👥 Участники</button>
                        <button class="group-call-btn active" onclick="showGroupCall()">🔴 Вернуться к звонку</button>
                    `;
                }
                
                displayGroups(groups);
                
            } catch (err) {
                console.error('Error starting group call:', err);
                alert('Не удалось получить доступ к камере/микрофону');
            }
        }
        
        async function createGroupPeerConnection(targetUserId, targetUserName) {
            console.log('Creating peer connection for user:', targetUserId);
            
            const peer = new SimplePeer({
                initiator: true,
                stream: groupCallStream,
                trickle: false,
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:global.stun.twilio.com:3478' }
                    ]
                }
            });
            
            groupPeers[targetUserId] = peer;
            
            peer.on('signal', (data) => {
                console.log('Group call signal for user', targetUserId, data.type);
                
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'group_call_' + data.type,
                        target_user_id: targetUserId,
                        group_id: activeGroupCall.groupId,
                        sdp: data.sdp,
                        candidate: data.candidate,
                        sender_id: currentUserId
                    }));
                }
            });
            
            peer.on('stream', (stream) => {
                console.log('Received stream from user', targetUserId);
                
                groupCallParticipants[targetUserId] = {
                    stream: stream,
                    audioEnabled: true,
                    videoEnabled: true,
                    userName: targetUserName
                };
                
                updateGroupCallUI();
            });
            
            peer.on('error', (err) => {
                console.error('Group peer error for user', targetUserId, err);
            });
            
            peer.on('close', () => {
                console.log('Group peer closed for user', targetUserId);
                delete groupPeers[targetUserId];
                delete groupCallParticipants[targetUserId];
                updateGroupCallUI();
            });
        }
        
        function handleGroupCallOffer(data) {
            console.log('Received group call offer from user', data.sender_id);
            
            if (!activeGroupCall) {
                showIncomingGroupCallNotification(data);
                return;
            }
            
            createGroupPeerAnswer(data);
        }
        
        async function createGroupPeerAnswer(data) {
            const callerId = data.sender_id;
            
            const caller = contacts.find(c => c.id === callerId) || 
                          { full_name: `User ${callerId}`, username: `#user${callerId}` };
            
            const peer = new SimplePeer({
                initiator: false,
                stream: groupCallStream,
                trickle: false,
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:global.stun.twilio.com:3478' }
                    ]
                }
            });
            
            groupPeers[callerId] = peer;
            
            peer.on('signal', (signalData) => {
                console.log('Answer signal for user', callerId, signalData.type);
                
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'group_call_' + signalData.type,
                        target_user_id: callerId,
                        group_id: activeGroupCall.groupId,
                        sdp: signalData.sdp,
                        candidate: signalData.candidate,
                        sender_id: currentUserId
                    }));
                }
            });
            
            peer.on('stream', (stream) => {
                console.log('Received stream from user', callerId);
                
                groupCallParticipants[callerId] = {
                    stream: stream,
                    audioEnabled: true,
                    videoEnabled: true,
                    userName: caller.full_name
                };
                
                updateGroupCallUI();
            });
            
            peer.on('error', (err) => {
                console.error('Group peer error for user', callerId, err);
            });
            
            peer.on('close', () => {
                console.log('Group peer closed for user', callerId);
                delete groupPeers[callerId];
                delete groupCallParticipants[callerId];
                updateGroupCallUI();
            });
            
            peer.signal(data);
        }
        
        function handleGroupCallAnswer(data) {
            console.log('Received group call answer from user', data.sender_id);
            
            if (groupPeers[data.sender_id]) {
                groupPeers[data.sender_id].signal(data);
            }
        }
        
        function handleGroupCallIce(data) {
            console.log('Received group call ICE from user', data.sender_id);
            
            if (groupPeers[data.sender_id]) {
                groupPeers[data.sender_id].signal(data);
            }
        }
        
        function handleGroupCallLeave(data) {
            console.log('User left group call:', data.sender_id);
            
            if (groupPeers[data.sender_id]) {
                groupPeers[data.sender_id].destroy();
                delete groupPeers[data.sender_id];
            }
            
            delete groupCallParticipants[data.sender_id];
            
            updateGroupCallUI();
        }
        
        function showIncomingGroupCallNotification(data) {
            fetch(`/api/groups/${data.group_id}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(res => res.json())
            .then(group => {
                const notification = document.createElement('div');
                notification.className = 'incoming-call';
                notification.id = 'incomingGroupCall';
                notification.innerHTML = `
                    <div class="incoming-call-header">
                        <div class="incoming-call-avatar">👥</div>
                        <div class="incoming-call-info">
                            <h3>Групповой звонок</h3>
                            <p>Группа: ${group.name}</p>
                        </div>
                    </div>
                    <div class="incoming-call-buttons">
                        <button class="accept-call" onclick="acceptGroupCall(${data.group_id})">✅ Присоединиться</button>
                        <button class="reject-call" onclick="rejectGroupCall(${data.group_id})">❌ Отклонить</button>
                    </div>
                `;
                
                incomingCallContainer.appendChild(notification);
                
                window.pendingGroupCall = {
                    groupId: data.group_id,
                    offerData: data
                };
                
                playRingtone();
                
                setTimeout(() => {
                    const notif = document.getElementById('incomingGroupCall');
                    if (notif) notif.remove();
                    stopRingtone();
                }, 30000);
            });
        }
        
        async function acceptGroupCall(groupId) {
            try {
                hideIncomingCallNotification();
                stopRingtone();
                
                groupCallStream = await navigator.mediaDevices.getUserMedia({ 
                    video: true, 
                    audio: true 
                });
                
                const membersResponse = await fetch(`/api/groups/${groupId}/members`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const members = await membersResponse.json();
                
                activeGroupCall = {
                    groupId: groupId,
                    participants: members.map(m => m.user_id),
                    startTime: Date.now()
                };
                
                groupCallParticipants = {};
                groupCallParticipants[currentUserId] = {
                    stream: groupCallStream,
                    audioEnabled: true,
                    videoEnabled: true,
                    userName: 'Вы'
                };
                
                if (window.pendingGroupCall && window.pendingGroupCall.offerData) {
                    await createGroupPeerAnswer(window.pendingGroupCall.offerData);
                }
                
                updateGroupCallUI();
                
                document.getElementById('groupCallTitle').textContent = `Групповой звонок (${members.length} участников)`;
                groupCallModal.style.display = 'block';
                
                if (selectedGroupId === groupId) {
                    const actions = document.getElementById('chatHeaderActions');
                    actions.innerHTML = `
                        <button class="members-list-btn" onclick="showGroupMembers(${groupId})">👥 Участники</button>
                        <button class="group-call-btn active" onclick="showGroupCall()">🔴 Вернуться к звонку</button>
                    `;
                }
                
                window.pendingGroupCall = null;
                
            } catch (err) {
                console.error('Error accepting group call:', err);
                alert('Не удалось присоединиться к звонку');
            }
        }
        
        function rejectGroupCall(groupId) {
            hideIncomingCallNotification();
            stopRingtone();
            window.pendingGroupCall = null;
        }
        
        function updateGroupCallUI() {
            const container = document.getElementById('groupVideoContainer');
            container.innerHTML = '';
            
            addVideoToGrid(currentUserId, 'Вы', groupCallStream, true);
            
            for (const [userId, participant] of Object.entries(groupCallParticipants)) {
                if (parseInt(userId) !== currentUserId && participant.stream) {
                    addVideoToGrid(parseInt(userId), participant.userName || `User ${userId}`, participant.stream, false);
                }
            }
            
            const count = Object.keys(groupCallParticipants).length;
            document.getElementById('participantsCount').textContent = `${count} участник${count !== 1 ? 'ов' : ''}`;
        }
        
        function addVideoToGrid(userId, userName, stream, isLocal) {
            const container = document.getElementById('groupVideoContainer');
            
            const wrapper = document.createElement('div');
            wrapper.className = 'video-wrapper';
            wrapper.id = `video-wrapper-${userId}`;
            
            const video = document.createElement('video');
            video.id = `video-${userId}`;
            video.autoplay = true;
            video.playsInline = true;
            if (isLocal) video.muted = true;
            
            const label = document.createElement('div');
            label.className = 'video-label';
            label.textContent = isLocal ? 'Вы' : userName;
            
            wrapper.appendChild(video);
            wrapper.appendChild(label);
            container.appendChild(wrapper);
            
            if (video.srcObject !== stream) {
                video.srcObject = stream;
            }
        }
        
        function showGroupCall() {
            if (activeGroupCall) {
                groupCallModal.style.display = 'block';
                updateGroupCallUI();
            }
        }
        
        function endGroupCall() {
            console.log('Ending group call');
            
            if (ws && ws.readyState === WebSocket.OPEN) {
                for (const userId of Object.keys(groupPeers)) {
                    ws.send(JSON.stringify({
                        type: 'group_call_leave',
                        target_user_id: parseInt(userId),
                        group_id: activeGroupCall.groupId,
                        sender_id: currentUserId
                    }));
                }
            }
            
            for (const peer of Object.values(groupPeers)) {
                peer.destroy();
            }
            groupPeers = {};
            
            if (groupCallStream) {
                groupCallStream.getTracks().forEach(track => track.stop());
                groupCallStream = null;
            }
            
            groupCallParticipants = {};
            activeGroupCall = null;
            
            groupCallModal.style.display = 'none';
            
            if (selectedGroupId) {
                const group = groups.find(g => g.id === selectedGroupId);
                if (group) {
                    const actions = document.getElementById('chatHeaderActions');
                    actions.innerHTML = `
                        <button class="members-list-btn" onclick="showGroupMembers(${selectedGroupId})">👥 Участники</button>
                        <button class="group-call-btn" onclick="startGroupCall(${selectedGroupId})">📹 Групповой звонок</button>
                    `;
                }
            }
            
            displayGroups(groups);
        }
        
        function toggleGroupAudio() {
            if (groupCallStream) {
                const audioTrack = groupCallStream.getAudioTracks()[0];
                if (audioTrack) {
                    audioTrack.enabled = !audioTrack.enabled;
                    document.getElementById('groupMuteAudioBtn').classList.toggle('muted', !audioTrack.enabled);
                    document.getElementById('groupMuteAudioBtn').textContent = audioTrack.enabled ? '🎤' : '🔇';
                }
            }
        }
        
        function toggleGroupVideo() {
            if (groupCallStream) {
                const videoTrack = groupCallStream.getVideoTracks()[0];
                if (videoTrack) {
                    videoTrack.enabled = !videoTrack.enabled;
                    document.getElementById('groupMuteVideoBtn').classList.toggle('muted', !videoTrack.enabled);
                    document.getElementById('groupMuteVideoBtn').textContent = videoTrack.enabled ? '📹' : '🚫';
                }
            }
        }
        
        // ========== ЛИЧНЫЕ ЗВОНКИ ==========
        
        async function startCall(targetUserId, targetUserName) {
            try {
                if (activeCall) {
                    alert('У вас уже есть активный звонок');
                    return;
                }
                
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                localVideo.srcObject = localStream;
                
                const peer = new SimplePeer({
                    initiator: true,
                    stream: localStream,
                    trickle: false,
                    config: {
                        iceServers: [
                            { urls: 'stun:stun.l.google.com:19302' },
                            { urls: 'stun:global.stun.twilio.com:3478' }
                        ]
                    }
                });
                
                peers[targetUserId] = peer;
                activeCall = { userId: targetUserId, userName: targetUserName, peer: peer };
                
                peer.on('signal', (data) => {
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({
                            type: data.type,
                            sender_id: currentUserId,
                            target_user_id: targetUserId,
                            sdp: data.sdp,
                            candidate: data.candidate
                        }));
                    }
                });
                
                peer.on('stream', (stream) => {
                    remoteVideo.srcObject = stream;
                });
                
                peer.on('error', (err) => {
                    console.error('Peer error:', err);
                    alert('Ошибка соединения');
                    endCall();
                });
                
                peer.on('close', () => endCall());
                
                document.getElementById('remoteVideoLabel').textContent = targetUserName;
                document.getElementById('callModalTitle').textContent = `Звонок с ${targetUserName}`;
                callModal.style.display = 'block';
                
            } catch (err) {
                console.error('Error starting call:', err);
                alert('Не удалось получить доступ к камере/микрофону');
            }
        }
        
        function handleCallSignal(data) {
            const callerId = data.sender_id || data.target_user_id;
            
            if (data.type === 'answer' && peers[callerId]) {
                peers[callerId].signal(data);
                return;
            }
            
            if (data.type === 'offer') {
                fetch('/api/contacts', {
                    headers: { 'Authorization': `Bearer ${token}` }
                })
                .then(res => res.json())
                .then(contacts => {
                    const caller = contacts.find(c => c.id == callerId) || 
                                  { id: callerId, full_name: `User ${callerId}`, username: `#user${callerId}` };
                    
                    showIncomingCallNotification(caller, data);
                    playRingtone();
                    
                    incomingCallTimeout = setTimeout(() => {
                        hideIncomingCallNotification();
                        stopRingtone();
                        if (ws && ws.readyState === WebSocket.OPEN) {
                            ws.send(JSON.stringify({
                                type: 'call-rejected',
                                target_user_id: callerId
                            }));
                        }
                    }, 30000);
                });
            }
        }
        
        function handleIceCandidate(data) {
            if (peers[data.sender_id]) {
                peers[data.sender_id].signal(data);
            }
        }
        
        function handleCallRejected(data) {
            alert('Пользователь отклонил звонок');
            endCall();
        }
        
        function showIncomingCallNotification(caller, offerData) {
            hideIncomingCallNotification();
            
            const notification = document.createElement('div');
            notification.className = 'incoming-call';
            notification.id = 'incomingCall';
            notification.innerHTML = `
                <div class="incoming-call-header">
                    <div class="incoming-call-avatar">${caller.full_name.charAt(0).toUpperCase()}</div>
                    <div class="incoming-call-info">
                        <h3>${caller.full_name}</h3>
                        <p>${caller.username}</p>
                    </div>
                </div>
                <div class="incoming-call-buttons">
                    <button class="accept-call" onclick="acceptCall(${caller.id}, '${caller.full_name}')">✅ Принять</button>
                    <button class="reject-call" onclick="rejectCall(${caller.id})">❌ Отклонить</button>
                </div>
            `;
            
            incomingCallContainer.appendChild(notification);
            window.pendingCall = { callerId: caller.id, offerData: offerData };
        }
        
        function hideIncomingCallNotification() {
            const existing = document.getElementById('incomingCall');
            if (existing) existing.remove();
            const groupExisting = document.getElementById('incomingGroupCall');
            if (groupExisting) groupExisting.remove();
            
            if (incomingCallTimeout) {
                clearTimeout(incomingCallTimeout);
                incomingCallTimeout = null;
            }
        }
        
        async function acceptCall(callerId, callerName) {
            try {
                hideIncomingCallNotification();
                stopRingtone();
                
                if (activeCall) {
                    alert('У вас уже есть активный звонок');
                    rejectCall(callerId);
                    return;
                }
                
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                localVideo.srcObject = localStream;
                
                const peer = new SimplePeer({
                    initiator: false,
                    stream: localStream,
                    trickle: false,
                    config: {
                        iceServers: [
                            { urls: 'stun:stun.l.google.com:19302' },
                            { urls: 'stun:global.stun.twilio.com:3478' }
                        ]
                    }
                });
                
                peers[callerId] = peer;
                activeCall = { userId: callerId, userName: callerName, peer: peer };
                
                peer.on('signal', (data) => {
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({
                            type: data.type,
                            sender_id: currentUserId,
                            target_user_id: callerId,
                            sdp: data.sdp,
                            candidate: data.candidate
                        }));
                    }
                });
                
                peer.on('stream', (stream) => {
                    remoteVideo.srcObject = stream;
                });
                
                if (window.pendingCall && window.pendingCall.offerData) {
                    peer.signal(window.pendingCall.offerData);
                }
                
                document.getElementById('remoteVideoLabel').textContent = callerName;
                document.getElementById('callModalTitle').textContent = `Звонок с ${callerName}`;
                callModal.style.display = 'block';
                
                window.pendingCall = null;
                
            } catch (err) {
                console.error('Error accepting call:', err);
                alert('Не удалось получить доступ к камере/микрофону');
            }
        }
        
        function rejectCall(callerId) {
            hideIncomingCallNotification();
            stopRingtone();
            
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'call-rejected',
                    target_user_id: callerId
                }));
            }
            
            window.pendingCall = null;
        }
        
        function endCall() {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            
            Object.values(peers).forEach(peer => peer.destroy());
            peers = {};
            
            if (localVideo.srcObject) {
                localVideo.srcObject.getTracks().forEach(track => track.stop());
                localVideo.srcObject = null;
            }
            if (remoteVideo.srcObject) {
                remoteVideo.srcObject.getTracks().forEach(track => track.stop());
                remoteVideo.srcObject = null;
            }
            
            callModal.style.display = 'none';
            activeCall = null;
            window.pendingCall = null;
            stopRingtone();
        }
        
        // ========== ЗВУКОВЫЕ УВЕДОМЛЕНИЯ ==========
        
        let ringtone = null;
        
        function playRingtone() {
            try {
                if (!ringtone) {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    const audioCtx = new AudioContext();
                    
                    const oscillator = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(440, audioCtx.currentTime);
                    
                    gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
                    gainNode.gain.setValueAtTime(0, audioCtx.currentTime + 0.5);
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    
                    oscillator.start();
                    
                    ringtone = {
                        stop: () => {
                            oscillator.stop();
                            audioCtx.close();
                        }
                    };
                    
                    window.ringtoneInterval = setInterval(() => {
                        if (audioCtx.state === 'suspended') {
                            audioCtx.resume();
                        }
                        oscillator.start();
                    }, 3000);
                }
            } catch (e) {
                console.log('Ringtone not supported');
            }
        }
        
        function stopRingtone() {
            if (ringtone) {
                ringtone.stop();
                ringtone = null;
            }
            if (window.ringtoneInterval) {
                clearInterval(window.ringtoneInterval);
                window.ringtoneInterval = null;
            }
        }
        
        // Инициализация
        document.addEventListener('DOMContentLoaded', async () => {
            console.log('Page loaded, currentUserId:', currentUserId);
            
            if (!token) {
                window.location.href = '/login';
                return;
            }
            
            try {
                await loadContacts();
                connectWebSocket();
            } catch (err) {
                console.error('Error during initialization:', err);
            }
            
            document.getElementById('sendMessageBtn').onclick = sendMessage;
            document.getElementById('messageInput').onkeypress = (e) => {
                if (e.key === 'Enter') sendMessage();
            };
            
            document.getElementById('createGroupBtn').onclick = showCreateGroupModal;
            
            document.getElementById('muteAudioBtn').onclick = () => {
                if (localStream) {
                    const audioTrack = localStream.getAudioTracks()[0];
                    if (audioTrack) {
                        audioTrack.enabled = !audioTrack.enabled;
                        document.getElementById('muteAudioBtn').style.opacity = 
                            audioTrack.enabled ? '1' : '0.5';
                    }
                }
            };
            
            document.getElementById('muteVideoBtn').onclick = () => {
                if (localStream) {
                    const videoTrack = localStream.getVideoTracks()[0];
                    if (videoTrack) {
                        videoTrack.enabled = !videoTrack.enabled;
                        document.getElementById('muteVideoBtn').style.opacity = 
                            videoTrack.enabled ? '1' : '0.5';
                    }
                }
            };
            
            window.onclick = (event) => {
                if (event.target === callModal) {
                    endCall();
                }
                if (event.target === groupCallModal) {
                    endGroupCall();
                }
                if (event.target === createGroupModal) {
                    closeCreateGroupModal();
                }
                if (event.target === groupMembersModal) {
                    closeGroupMembersModal();
                }
            };
        });
    </script>
